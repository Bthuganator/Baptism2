<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parker Baptism Program</title>
  <style>
    :root{
      --bg:#e9edf2;
      --text:#223;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap{
      width:min(100%%, 980px);
      margin:0 auto;
      padding:20px 14px 48px;
    }
    .program-page{
      margin:22px auto 34px;
      width:min(100%%, 760px);
    }
    .program-page img{
      display:block;
      width:100%%;
      height:auto;
      border-radius:6px;
      box-shadow:
        0 8px 24px rgba(0,0,0,.12),
        0 2px 6px rgba(0,0,0,.08);
    }
    @media (max-width: 640px){
      .wrap{padding:10px 8px 28px}
      .program-page{margin:12px auto 18px; width:100%%}
      .program-page img{border-radius:4px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="program-page"><img src="sheet1-bottom.png" alt=""></section>
    <section class="program-page"><img src="sheet2-bottom.png" alt=""></section>
    <section class="program-page"><img src="sheet2-top.png" alt=""></section>
    <section class="program-page"><img src="sheet1-top.png" alt=""></section>
  </main>
</body>
</html>
